services:
  claude-wrapper:
    build: .
    command: ["poetry", "run", "uvicorn", "src.main:app", "--host", "0.0.0.0", "--port", "8000"]
    restart: unless-stopped
    ports:
      - "8000"
    volumes:
      - claude-auth:/root/.claude
      - claude-workspace:/workspace
    environment:
      PORT: "8000"
      CLAUDE_WRAPPER_HOST: "0.0.0.0"
      CLAUDE_CWD: "/workspace"
    env_file:
      - .env

volumes:
  claude-auth:
  claude-workspace:
