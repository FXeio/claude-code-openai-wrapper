services:
  claude-wrapper:
    build: .
    command: ["poetry", "run", "python", "main.py"]
    restart: unless-stopped
    ports:
      - "8000"
    volumes:
      - claude-auth:/root/.claude
      - claude-workspace:/workspace
    environment:
      PORT: "8000"
      CLAUDE_WRAPPER_HOST: "0.0.0.0"
    env_file:
      - .env

volumes:
  claude-auth:
  claude-workspace:
