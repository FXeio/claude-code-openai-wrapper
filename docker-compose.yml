services:
  claude-wrapper:
    build: .
    # `command` omitted on purpose — the Dockerfile's CMD uses the venv on PATH,
    # so no `poetry run` is needed (poetry is not installed in the runtime stage).
    restart: unless-stopped
    ports:
      - "8000"
    volumes:
      - claude-auth:/home/appuser/.claude
      - claude-workspace:/workspace
    environment:
      PORT: "8000"
      CLAUDE_WRAPPER_HOST: "0.0.0.0"
      CLAUDE_CWD: "/workspace"
    env_file:
      - .env

volumes:
  claude-auth:
  claude-workspace:
